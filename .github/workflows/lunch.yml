name: Update Lunch Menus

on:
  schedule:
    - cron: '22 6 *  * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-lunch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Start Ollama
        run: |
          docker run -d \
            --name ollama \
            -p 11434:11434 \
            ollama/ollama:latest

      - name: Wait for Ollama
        run: |
          echo "Waiting for Ollama to be ready..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:11434/api/tags > /dev/null && echo "Ready!" && break
            echo "  attempt $i..."
            sleep 3
          done

      - name: Pull model
        run: docker exec ollama ollama pull llama3.2:3b

      - name: Build
        run: mvn package -q -DskipTests

      - name: Install Playwright browsers
        run: java -cp target/lunch-1.0-SNAPSHOT-jar-with-dependencies.jar com.microsoft.playwright.CLI install --with-deps chromium

      - name: Run scraper
        env:
          OLLAMA_URL: http://localhost:11434
          OLLAMA_MODEL: llama3.2:3b
        run: java -jar target/lunch-1.0-SNAPSHOT-jar-with-dependencies.jar

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          commit_message: "lunch: update menus ${{ github.run_id }}"
